name: "A react CI pipeline/workflow "
on:
    push:
        branches:
            - main
            - master
jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name : "setup nodeJS"
              uses: actions/setup-node@v4
              with: 
                node-version: "20"
            - name : "check node version"
              run: node --version
              
               
